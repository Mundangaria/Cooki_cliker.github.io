<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍪 Cookie Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2d1b0e, #4a2c1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        .game-container {
            background: rgba(255, 215, 170, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 2px solid rgba(255, 215, 170, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
            text-align: center;
            position: relative;
        }

        /* ===== TITLE ===== */
        .title {
            color: #f5d6b3;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }
        .title span {
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* ===== COOKIE COUNTER ===== */
        .counter {
            color: #ffd9b3;
            font-size: 48px;
            font-weight: 800;
            margin: 10px 0 5px 0;
            text-shadow: 0 4px 15px rgba(255, 200, 100, 0.2);
        }
        .counter-label {
            color: rgba(255, 215, 170, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* ===== COOKIE BUTTON ===== */
        .cookie-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 35% 35%, #f5d6b3, #c48a5c);
            cursor: pointer;
            position: relative;
            margin: 10px auto 25px auto;
            box-shadow:
                0 12px 35px rgba(0, 0, 0, 0.5),
                inset 0 -8px 20px rgba(80, 40, 10, 0.4),
                inset 0 8px 20px rgba(255, 220, 180, 0.3);
            transition: transform 0.08s ease;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
        }
        .cookie-btn:hover {
            transform: scale(1.02);
        }
        .cookie-btn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .cookie-btn .chocolate-chips {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            border-radius: 50%;
            overflow: hidden;
        }
        .chip {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #3d1f0a;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .chip:nth-child(1) {
            top: 25%;
            left: 20%;
            width: 18px;
            height: 16px;
        }
        .chip:nth-child(2) {
            top: 15%;
            right: 25%;
            width: 12px;
            height: 14px;
        }
        .chip:nth-child(3) {
            bottom: 30%;
            left: 15%;
            width: 16px;
            height: 12px;
        }
        .chip:nth-child(4) {
            bottom: 20%;
            right: 18%;
            width: 14px;
            height: 18px;
        }
        .chip:nth-child(5) {
            top: 50%;
            left: 10%;
            width: 10px;
            height: 10px;
        }
        .chip:nth-child(6) {
            top: 45%;
            right: 12%;
            width: 12px;
            height: 12px;
        }
        .chip:nth-child(7) {
            top: 30%;
            left: 45%;
            width: 20px;
            height: 14px;
        }
        .chip:nth-child(8) {
            bottom: 35%;
            left: 40%;
            width: 10px;
            height: 16px;
        }

        /* ===== STATS ===== */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px 10px;
            border: 1px solid rgba(255, 215, 170, 0.08);
        }
        .stat-box .value {
            color: #ffd9b3;
            font-size: 22px;
            font-weight: 700;
        }
        .stat-box .label {
            color: rgba(255, 215, 170, 0.4);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ===== UPGRADES ===== */
        .upgrades-title {
            color: rgba(255, 215, 170, 0.6);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 12px 0;
        }
        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .upgrade-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 170, 0.1);
            border-radius: 14px;
            padding: 12px 8px;
            color: #f5d6b3;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .upgrade-btn:hover {
            background: rgba(255, 215, 170, 0.08);
            border-color: rgba(255, 215, 170, 0.2);
            transform: translateY(-2px);
        }
        .upgrade-btn:active {
            transform: scale(0.96);
        }
        .upgrade-btn .upgrade-name {
            font-size: 14px;
            font-weight: 600;
        }
        .upgrade-btn .upgrade-cost {
            font-size: 12px;
            color: #ffd9b3;
            margin-top: 4px;
            opacity: 0.6;
        }
        .upgrade-btn .upgrade-effect {
            font-size: 11px;
            color: #aaffaa;
            margin-top: 2px;
            opacity: 0.7;
        }
        .upgrade-btn.locked {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        .upgrade-btn.locked:hover {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 215, 170, 0.1);
            transform: none;
        }

        /* ===== FLOATING PARTICLES ===== */
        .floating-particle {
            position: fixed;
            pointer-events: none;
            font-size: 30px;
            animation: floatUp 1.2s ease-out forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(1.2) rotate(40deg);
            }
        }

        /* ===== RESET BUTTON ===== */
        .reset-btn {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.2);
            color: rgba(255, 150, 150, 0.6);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 15px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .reset-btn:hover {
            background: rgba(255, 50, 50, 0.2);
            color: rgba(255, 150, 150, 0.9);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .game-container {
                padding: 25px 20px;
                border-radius: 32px;
            }
            .title {
                font-size: 22px;
            }
            .counter {
                font-size: 36px;
            }
            .cookie-btn {
                width: 160px;
                height: 160px;
                font-size: 65px;
            }
            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .stat-box .value {
                font-size: 18px;
            }
            .upgrade-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .upgrade-btn {
                padding: 10px 6px;
                min-height: 60px;
            }
            .upgrade-btn .upgrade-name {
                font-size: 12px;
            }
            .chip {
                width: 10px !important;
                height: 10px !important;
            }
        }
        @media (max-width: 380px) {
            .cookie-btn {
                width: 130px;
                height: 130px;
                font-size: 50px;
            }
            .counter {
                font-size: 30px;
            }
            .stats {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- TITLE -->
        <div class="title">
            <span>🍪</span> Cookie Clicker
        </div>

        <!-- COUNTER -->
        <div class="counter" id="cookieCount">0</div>
        <div class="counter-label">Cookies</div>

        <!-- COOKIE BUTTON -->
        <button class="cookie-btn" id="cookieBtn">
            🍪
            <div class="chocolate-chips">
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
            </div>
        </button>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-box">
                <div class="value" id="cpsDisplay">0</div>
                <div class="label">🍪 pro Sekunde</div>
            </div>
            <div class="stat-box">
                <div class="value" id="totalClicksDisplay">0</div>
                <div class="label">👆 Klicks</div>
            </div>
        </div>

        <!-- UPGRADES -->
        <div class="upgrades-title">⬆ Upgrades</div>
        <div class="upgrade-grid" id="upgradeGrid">
            <!-- Wird von JavaScript befüllt -->
        </div>

        <!-- RESET -->
        <button class="reset-btn" id="resetBtn">🔄 Alles zurücksetzen</button>
    </div>

    <script>
        // ============================================================
        // SPIEL-DATEN
        // ============================================================
        let cookies = 0;
        let totalClicks = 0;
        let clickMultiplier = 1;
        let cps = 0;
        let clickPower = 1;

        const upgrades = [{
            id: 'clicker',
            name: '👆 Stärkere Klicks',
            baseCost: 10,
            costMultiplier: 1.15,
            effect: '+1 pro Klick',
            level: 0,
            maxLevel: 50,
            apply: function() {
                clickPower = 1 + this.level;
            }
        }, {
            id: 'auto',
            name: '🤖 Automatischer Klicker',
            baseCost: 20,
            costMultiplier: 1.12,
            effect: '+1 CPS',
            level: 0,
            maxLevel: 50,
            apply: function() {
                cps = this.level;
            }
        }, {
            id: 'multiplier',
            name: '🌟 Multiplikator',
            baseCost: 50,
            costMultiplier: 1.25,
            effect: '×2 Klick-Kraft',
            level: 0,
            maxLevel: 20,
            apply: function() {
                clickMultiplier = Math.pow(2, this.level);
            }
        }, {
            id: 'golden',
            name: '✨ Goldener Keks',
            baseCost: 150,
            costMultiplier: 1.3,
            effect: '+5 pro Klick',
            level: 0,
            maxLevel: 30,
            apply: function() {
                // Zusätzlicher Bonus zusätzlich zum normalen Click-Power
                // Wird in der click-Funktion berücksichtigt
            }
        }];

        // ============================================================
        // DOM-REFERENZEN
        // ============================================================
        const cookieCountEl = document.getElementById('cookieCount');
        const cpsDisplayEl = document.getElementById('cpsDisplay');
        const totalClicksEl = document.getElementById('totalClicksDisplay');
        const cookieBtn = document.getElementById('cookieBtn');
        const upgradeGrid = document.getElementById('upgradeGrid');
        const resetBtn = document.getElementById('resetBtn');

        // ============================================================
        // SPEICHERN & LADEN
        // ============================================================
        function saveGame() {
            const saveData = {
                cookies: cookies,
                totalClicks: totalClicks,
                clickMultiplier: clickMultiplier,
                cps: cps,
                clickPower: clickPower,
                upgrades: upgrades.map(u => ({ level: u.level }))
            };
            try {
                localStorage.setItem('cookieClickerSave', JSON.stringify(saveData));
            } catch (e) {}
        }

        function loadGame() {
            try {
                const raw = localStorage.getItem('cookieClickerSave');
                if (!raw) return false;
                const data = JSON.parse(raw);
                cookies = data.cookies || 0;
                totalClicks = data.totalClicks || 0;
                clickMultiplier = data.clickMultiplier || 1;
                cps = data.cps || 0;
                clickPower = data.clickPower || 1;

                if (data.upgrades && data.upgrades.length === upgrades.length) {
                    upgrades.forEach((u, i) => {
                        u.level = data.upgrades[i].level || 0;
                        u.apply();
                    });
                }
                return true;
            } catch (e) {
                return false;
            }
        }

        // ============================================================
        // UPGRADE-KOSTEN
        // ============================================================
        function getUpgradeCost(upgrade) {
            return Math.floor(upgrade.baseCost * Math.pow(upgrade.costMultiplier, upgrade.level));
        }

        function getGoldenBonus() {
            const goldenUpgrade = upgrades.find(u => u.id === 'golden');
            return goldenUpgrade ? goldenUpgrade.level * 5 : 0;
        }

        // ============================================================
        // UI AKTUALISIEREN
        // ============================================================
        function updateUI() {
            cookieCountEl.textContent = Math.floor(cookies);
            cpsDisplayEl.textContent = cps;
            totalClicksEl.textContent = totalClicks;
            renderUpgrades();
            saveGame();
        }

        function renderUpgrades() {
            upgradeGrid.innerHTML = '';
            upgrades.forEach((upgrade, index) => {
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn';
                const cost = getUpgradeCost(upgrade);
                const isMaxLevel = upgrade.level >= upgrade.maxLevel;
                const canAfford = cookies >= cost && !isMaxLevel;

                if (!canAfford || isMaxLevel) {
                    btn.classList.add('locked');
                }

                btn.innerHTML = `
                    <div class="upgrade-name">${upgrade.name}</div>
                    <div class="upgrade-cost">${isMaxLevel ? '✅ MAX' : `🍪 ${cost}`}</div>
                    <div class="upgrade-effect">${upgrade.effect} (${upgrade.level}/${upgrade.maxLevel})</div>
                `;

                btn.addEventListener('click', () => {
                    if (isMaxLevel) return;
                    if (cookies < cost) return;
                    cookies -= cost;
                    upgrade.level++;
                    upgrade.apply();

                    // Spezielle Anwendung für Golden Upgrade
                    if (upgrade.id === 'golden') {
                        // Bonus wird in click-Funktion berücksichtigt
                    }

                    updateUI();

                    // Partikel-Effekt beim Kauf
                    createParticle(btn, '⬆', '#aaffaa');
                });

                upgradeGrid.appendChild(btn);
            });
        }

        // ============================================================
        // COOKIE KLICKEN
        // ============================================================
        function clickCookie(e) {
            const goldenBonus = getGoldenBonus();
            const totalClickPower = (clickPower + goldenBonus) * clickMultiplier;
            const gained = totalClickPower;

            cookies += gained;
            totalClicks++;

            // Partikel beim Klicken
            const rect = cookieBtn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const emojis = ['🍪', '✨', '🌟', '💫', '⭐'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            createParticleAt(cx + (Math.random() - 0.5) * 60, cy + (Math.random() - 0.5) * 60, emoji, '#ffd9b3');

            // Kleine Vibration bei mobilen Geräten (wenn verfügbar)
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }

            updateUI();
        }

        // ============================================================
        // PARTIKEL-EFFEKTE
        // ============================================================
        function createParticle(element, emoji, color) {
            const rect = element.getBoundingClientRect();
            const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 40;
            const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 40;
            createParticleAt(x, y, emoji, color);
        }

        function createParticleAt(x, y, emoji, color) {
            const el = document.createElement('div');
            el.className = 'floating-particle';
            el.textContent = emoji;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color || '#ffd9b3';
            el.style.fontSize = (25 + Math.random() * 25) + 'px';
            document.body.appendChild(el);
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, 1200);
        }

        // ============================================================
        // AUTOMATISCHER CPS
        // ============================================================
        function tickCPS() {
            if (cps > 0) {
                cookies += cps;
                updateUI();
            }
        }

        // ============================================================
        // RESET
        // ============================================================
        function resetGame() {
            if (confirm('Wirklich alle Fortschritte zurücksetzen?')) {
                cookies = 0;
                totalClicks = 0;
                clickMultiplier = 1;
                cps = 0;
                clickPower = 1;
                upgrades.forEach(u => {
                    u.level = 0;
                    u.apply();
                });
                // Golden upgrade speziell zurücksetzen
                const golden = upgrades.find(u => u.id === 'golden');
                if (golden) golden.level = 0;
                updateUI();
                localStorage.removeItem('cookieClickerSave');
            }
        }

        // ============================================================
        // TASTATUR-SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                clickCookie(e);
            }
            if (e.key === 'r' && e.ctrlKey) {
                e.preventDefault();
                resetGame();
            }
        });

        // ============================================================
        // EVENT-LISTENER
        // ============================================================
        cookieBtn.addEventListener('click', clickCookie);
        cookieBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            clickCookie(e);
        }, { passive: false });

        resetBtn.addEventListener('click', resetGame);

        // ============================================================
        // INIT
        // ============================================================
        loadGame();
        // Stelle sicher, dass alle Upgrades korrekt angewendet werden
        upgrades.forEach(u => u.apply());
        // Golden upgrade manuell anwenden
        const golden = upgrades.find(u => u.id === 'golden');
        if (golden) golden.apply();

        updateUI();

        // CPS-Ticker (jede Sekunde)
        setInterval(tickCPS, 1000);

        // Alle 10 Sekunden speichern (zusätzlich)
        setInterval(saveGame, 10000);

        // Beim Verlassen der Seite speichern
        window.addEventListener('beforeunload', saveGame);

        console.log('🍪 Cookie Clicker geladen!');
        console.log(`🍪 Cookies: ${cookies}, CPS: ${cps}, Klick-Kraft: ${(clickPower + getGoldenBonus()) * clickMultiplier}`);

        // Shortcut-Hinweis in der Konsole
        console.log('💡 Tastatur: [Leertaste] = Klicken, [Strg+R] = Reset');
    </script>

</body>
</html>
